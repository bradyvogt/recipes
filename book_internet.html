<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Viewer</title>
    <link rel="stylesheet" href="common.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
</head>
<body>
    <header>
        <h1>Recipe Viewer</h1>
    </header>

    <div id="reactRoot" class="recipes-container"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const RECIPES_URL = 'https://fibqkucbquxzsmzjmgyx.supabase.co/storage/v1/object/public/recipe_storage/recipes.json';

        // Helpers to flexibly parse JSON-LD Recipe objects into a simple internal shape
        const parseDurationToMinutes = (iso) => {
            if (!iso || typeof iso !== 'string') return 0;
            // Supports PT#H#M, PT#M, PT#S
            const match = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!match) return 0;
            const hours = parseInt(match[1] || 0, 10);
            const minutes = parseInt(match[2] || 0, 10);
            const seconds = parseInt(match[3] || 0, 10);
            return hours * 60 + minutes + Math.round(seconds / 60);
        };

        const getTextFromInstruction = (ins) => {
            if (!ins) return '';
            if (typeof ins === 'string') return ins;
            if (ins.text) return ins.text;
            if (Array.isArray(ins)) return ins.map(getTextFromInstruction).join(' ');
            return '';
        };

        const parseJsonLdToRecipes = (data) => {
            const items = [];
            const candidates = [];
            if (!data) return items;
            if (Array.isArray(data)) candidates.push(...data);
            else if (data['@graph']) candidates.push(...data['@graph']);
            else if (data['@context'] && data['@type']) candidates.push(data);
            else if (data.items) candidates.push(...data.items);

            // Also accept an object keyed by id->obj
            if (Object.prototype.toString.call(data) === '[object Object]' && !candidates.length) {
                Object.values(data).forEach(v => { if (v && (v['@type'] || v.name)) candidates.push(v); });
            }

            candidates.forEach((node, idx) => {
                const type = node['@type'] || node['type'] || node['@type'];
                const isRecipe = (Array.isArray(type) && type.includes('Recipe')) || type === 'Recipe' || (node.name && (node.recipeIngredient || node.recipeInstructions));
                if (!isRecipe) return;

                const id = node['@id'] || node['id'] || `r-${idx}`;
                const title = node.name || node.headline || node.title || String(id);
                const ingredients = node.recipeIngredient || node.ingredients || [];
                let instructions = [];
                if (node.recipeInstructions) {
                    if (Array.isArray(node.recipeInstructions)) instructions = node.recipeInstructions.map(getTextFromInstruction);
                    else if (typeof node.recipeInstructions === 'string') instructions = [node.recipeInstructions];
                    else if (node.recipeInstructions.text) instructions = [node.recipeInstructions.text];
                }

                const prep_time = parseDurationToMinutes(node.prepTime || node.prep_time || node.prep);
                const cook_time = parseDurationToMinutes(node.cookTime || node.cook_time || node.cook);
                const servingsRaw = node.recipeYield || node.yield || node.servings || node.recipeYield;
                let servings = servingsRaw;
                if (typeof servingsRaw === 'string') {
                    const m = servingsRaw.match(/(\d+)/);
                    servings = m ? m[1] : servingsRaw;
                }

                let categories = [];
                if (node.recipeCategory) categories = Array.isArray(node.recipeCategory) ? node.recipeCategory : [node.recipeCategory];
                else if (node.keywords) categories = typeof node.keywords === 'string' ? node.keywords.split(',').map(s=>s.trim()) : node.keywords || [];

                const rating = node.aggregateRating && node.aggregateRating.ratingValue ? Number(node.aggregateRating.ratingValue) : (node.ratingValue ? Number(node.ratingValue) : 0);

                items.push({
                    id,
                    title,
                    ingredients: Array.isArray(ingredients) ? ingredients : [ingredients].filter(Boolean),
                    instructions,
                    prep_time: Number(prep_time || 0),
                    cook_time: Number(cook_time || 0),
                    servings,
                    categories: categories.map(c => String(c).toLowerCase()),
                    rating,
                    commonIngredients: [],
                });
            });

            return items;
        };

        const formatTime = (minutes) => {
            if (!minutes) return '';
            if (minutes >= 60) {
                const h = Math.floor(minutes / 60);
                const m = minutes % 60;
                return m ? `${h}h ${m}m` : `${h}h`;
            }
            return `${minutes}m`;
        };

        const getTotalCookTime = (recipe) => {
            return (Number(recipe.prep_time) || 0) + (Number(recipe.cook_time) || 0);
        };

        const formatIngredient = (ing) => {
            if (!ing) return '';
            if (typeof ing === 'string') return ing;
            if (ing.name) return ing.name;
            return JSON.stringify(ing);
        };

        const formatCopyIngredients = (recipe) => (recipe.ingredients || []).map(formatIngredient).join('\n');
        const formatCopyInstructions = (recipe) => (recipe.instructions || []).map((s,i)=>`${i+1}. ${s}`).join('\n');

        const getProperCase = (s) => { if (!s) return ''; return s.split(' ').map(p=>p.charAt(0).toUpperCase()+p.slice(1)).join(' '); };

        const getSimilarRecipes = (recipe, all = window.__loadedRecipes || []) => {
            const baseIngs = new Set((recipe.ingredients || []).map(i => (typeof i === 'string' ? i.toLowerCase() : formatIngredient(i).toLowerCase())));
            const scored = all.map(r => {
                if (r.id === recipe.id) return null;
                const rIngs = new Set((r.ingredients || []).map(i => (typeof i === 'string' ? i.toLowerCase() : formatIngredient(i).toLowerCase())));
                let common = 0;
                baseIngs.forEach(x => { if (rIngs.has(x)) common++; });
                return { recipe: r, score: common, commonIngredients: [...baseIngs].filter(x=>rIngs.has(x)) };
            }).filter(Boolean).sort((a,b)=>b.score-a.score);
            return scored.slice(0,10).map(s=>({ ...s.recipe, commonIngredients: s.commonIngredients }));
        };

        // Store loaded recipes globally for helper access
        window.__loadedRecipes = [];

        // Generic popup component
        const SimilarRecipePopup = ({ isOpen, onClose, title, recipes }) => {
            if (!isOpen) return null;

            return (
                <div className="modal show d-block similar-popup" tabIndex="-1" role="dialog">
                  <div className="modal-dialog" role="document">
                    <div className="modal-content">
                      <div className="modal-header" style={{background:'#246231',color:'#fff'}}>
                        <h5 className="modal-title">{title}</h5>
                        <button type="button" className="btn-close" style={{color:'#fff',fontWeight:'bold'}} onClick={onClose}>×</button>
                      </div>
                      <div className="modal-body" style={{background:'#ecf8ef'}}>
                        <ul>
                          {recipes.map((recipe) => (
                            <li key={recipe.id} style={{background:'#b6e2c6',margin:'10px 0',borderRadius:'6px',padding:'10px'}}>
                              <div className="row">
                                <div className="col-xs-8 text-left">
                                  <p style={{margin:0,fontWeight:'bold',color:'#246231'}}>{recipe.title}</p>
                                </div>
                                <div className="col-xs-4 text-right">
                                  <p style={{margin:0,color:'#246231'}}>Common Ingredients: {recipe.commonIngredients.join(", ")}</p>
                                </div>
                              </div>
                            </li>
                          ))}
                        </ul>
                      </div>
                      <div className="modal-footer" style={{background:'#ecf8ef'}}>
                        <button type="button" className="btn btn-similar-close" style={{background:'#246231',color:'#fff',border:'none',borderRadius:'4px',padding:'6px 18px'}} onClick={onClose}>
                          Close
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
            );
        };

        const ToggleContainer = ({ header, details }) => {
            const [isVisible, setIsVisible] = useState(false);

            const toggleDetails = () => setIsVisible(!isVisible);

            return (
                <div className="toggle-container">
                    <div className="toggle-header-container" onClick={toggleDetails} >
                        {header}
                    </div>
                    {isVisible && (
                        <div className="toggle-details-container">
                            {details}
                        </div>
                    )}
                </div>
            );
        };

        const IconMetric = ({ icon, label }) => {
            return (
                <div className="icon-label" style={{ display: 'flex', alignItems: 'center', gap: '5px'}}>
                    <div className="icon-half">
                        <img src={icon} alt="icon" style={{ width: '30px', height: '30px' }} />
                    </div>
                    <div className="label-half">
                        <h4 style={{margin: '0'}}>{label}</h4>
                    </div>
                </div>
            );
        };


        const RecipeSummary = ({ recipe }) => {
            return (
                <div className="recipe-header">
                    <h2 className="recipe-title">{recipe.title}</h2>
                    <a href={`single_recipe.html?recipe=${encodeURIComponent(recipe.title)}`} style={{ display: 'flex', alignItems: 'center', textDecoration: 'none' }}>
                        <img src={'icons/open_new_tab.svg'} alt="icon" style={{ width: '30px', height: '30px', cursor: 'pointer' }} />
                    </a>
                    {recipe.servings && (<IconMetric icon={ 'icons/servings.svg' } label={ recipe.servings } />)}
                    {getTotalCookTime(recipe) ? (<IconMetric icon={ 'icons/clock.svg' } label={ formatTime(getTotalCookTime(recipe)) } />):''}
                </div>
            );
        };

        const CopyButton = ({ textToCopy }) => {
            const [copyStatus, setCopyStatus] = useState(""); // '', 'success', 'error'

            const handleCopyClick = async () => {
                try {
                    await navigator.clipboard.writeText(textToCopy);
                    setCopyStatus("success");
                } catch (err) {
                    setCopyStatus("error");
                }

                setTimeout(() => {
                    setCopyStatus("");
                }, 2000); // Hide the indicator after 2 seconds
            };

            return (
                <img 
                    src={
                        copyStatus === 'success' ? 'icons/copy_success.svg' : 
                        copyStatus === 'error' ? 'icons/copy_error.svg' :
                        'icons/copy.svg'
                    } 
                    onClick={() => handleCopyClick()}
                    alt="icon"
                    style={{ width: '20px', height: '20px' }}
                />
            );
        };

        // Returns a formatted list of recipes with summary and details
        const RecipeList = ({ recipes, onSimilarClick }) => {

            return (
                <div>
                    {recipes.map((recipe) => (
                        <ToggleContainer
                            key={recipe.id}
                            header={<RecipeSummary key={recipe.id} recipe={recipe} />}
                            details={
                                <div>
                                    <div style={{ display: 'flex', justifyContent: 'center', gap: '20px' }}>
                                        {recipe.prep_time > 0 && (
                                            <IconMetric icon={'icons/prep_time.svg'} label={formatTime(recipe.prep_time)} />
                                        )}
                                        {recipe.cook_time > 0 && (
                                            <IconMetric icon={'icons/cook_time.svg'} label={formatTime(recipe.cook_time)} />
                                        )}
                                        <button className="btn btn-similar" onClick={() => onSimilarClick(recipe)}>
                                            <span style={{display:'inline-block',verticalAlign:'middle',marginRight:'6px'}}>&#128279;</span> <span>Similar</span>
                                        </button>
                                    </div>

                                    {recipe.ingredients && (
                                        <>
                                            <h4>Ingredients <CopyButton textToCopy={formatCopyIngredients(recipe)}/></h4>
                                            <ul>
                                                {recipe.ingredients.map((ingredient, idx) => (
                                                    <li key={idx}>{formatIngredient(ingredient)}</li>
                                                ))}
                                            </ul>
                                        </>
                                    )}

                                    {recipe.instructions && (
                                        <>
                                            <h4>Instructions <CopyButton textToCopy={formatCopyInstructions(recipe)}/></h4>
                                            <ul>
                                                {recipe.instructions.map((instruction, index) => (
                                                    <li key={index}>{instruction}</li>
                                                ))}
                                            </ul>
                                        </>
                                    )}
                                </div>
                            }
                        />
                    ))}
                </div>
            );
        };

        // SearchBar: simple search input for filtering recipes
        const SearchBar = ({ searchValue, onSearchChange }) => {
            return (
                <div className="search-bar-container">
                    <input
                        type="text"
                        className="search-bar-input"
                        placeholder="Search recipes by name..."
                        value={searchValue}
                        onChange={(e) => onSearchChange(e.target.value)}
                    />
                </div>
            );
        };

        // PillBoxCategorySelector: pill-style radio button selector for categories
        const PillBoxCategorySelector = ({ categories, selectedCategory, onSelect, recipes }) => {
            // Count recipes per category
            const categoryCounts = {};
            recipes.forEach(r => {
                (r.categories || []).forEach(cat => {
                    categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;
                });
            });

            // Sort categories by count descending, then alphabetically
            const sortedCategories = [...categories].sort((a, b) => {
                const diff = (categoryCounts[b] || 0) - (categoryCounts[a] || 0);
                if (diff !== 0) return diff;
                return a.localeCompare(b);
            });

            // Count for 'All'
            const allCount = recipes.length;

            return (
                <div className="pill-box-container">
                    <button
                        type="button"
                        className={selectedCategory === null ? 'pill-box selected' : 'pill-box'}
                        onClick={() => onSelect(null)}
                    >
                        All <span className="pill-count">({allCount})</span>
                    </button>
                    {sortedCategories.map((cat) => (
                        <button
                            key={cat}
                            type="button"
                            className={selectedCategory === cat ? 'pill-box selected' : 'pill-box'}
                            onClick={() => onSelect(cat)}
                        >
                            {getProperCase(cat)} <span className="pill-count">({categoryCounts[cat] || 0})</span>
                        </button>
                    ))}
                </div>
            );
        };

        // Main App Component - Manages state and displays recipes
        const App = () => {
            const [recipes, setRecipes] = useState([]);
            const [isPopupOpen, setIsPopupOpen] = useState(false);
            const [similarRecipes, setSimilarRecipes] = useState([]);
            const [search, setSearch] = useState('');
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [sortBy, setSortBy] = useState('title');
            const [sortAsc, setSortAsc] = useState(true);

            useEffect(() => {
                fetch(RECIPES_URL)
                    .then(res => res.json())
                    .then(data => {
                        const parsed = parseJsonLdToRecipes(data);
                        window.__loadedRecipes = parsed;
                        setRecipes(parsed);
                    })
                    .catch(err => {
                        console.error('Failed to load recipes:', err);
                    });
            }, []);

            // Get all unique categories from recipes (flattened)
            const allCategories = Array.from(new Set(recipes.flatMap(r => Array.isArray(r.categories) ? r.categories.map(c => c.toLowerCase()) : [])));

            // Filtering
            let filteredRecipes = recipes.filter(r => {
                if (search && !(r.title || '').toLowerCase().includes(search.toLowerCase())) return false;
                if (selectedCategory && !((r.categories || []).includes(selectedCategory))) return false;
                return true;
            });

            // Sorting (support title and rating)
            filteredRecipes.sort((a, b) => {
                if (sortBy === 'title') {
                    const cmp = (a.title || '').localeCompare(b.title || '');
                    return sortAsc ? cmp : -cmp;
                }
                if (sortBy === 'rating') {
                    const ra = Number(a.rating || 0);
                    const rb = Number(b.rating || 0);
                    const cmp = ra - rb;
                    return sortAsc ? -cmp : cmp; // higher rating first when asc=true
                }
                return 0;
            });

            // When a recipe is clicked, display a popup with related recipes
            const handleRecipeSimilarClick = (recipe) => {
                setSimilarRecipes(getSimilarRecipes(recipe, recipes));
                setIsPopupOpen(true);
            };

            return (
                <div>
                    <SearchBar searchValue={search} onSearchChange={setSearch} />
                    <PillBoxCategorySelector
                        categories={allCategories}
                        selectedCategory={selectedCategory}
                        onSelect={setSelectedCategory}
                        recipes={recipes}
                    />
                    <RecipeList recipes={filteredRecipes} onSimilarClick={handleRecipeSimilarClick} />
                    <SimilarRecipePopup isOpen={isPopupOpen} onClose={() => setIsPopupOpen(false)} title="Similar Recipes" recipes={similarRecipes} />
                </div>
            );
        }

        // render at the root
        const container = document.getElementById('reactRoot');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>

  </body>
</html>
